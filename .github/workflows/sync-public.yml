name: Sync to public repo

on:
  push:
    branches: [main]

concurrency:
  group: sync-public
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          path: private

      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          repository: centrifuge/protocol
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          path: public

      - name: Sync content
        run: |
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.publicignore' \
            --filter='. private/.publicignore' \
            private/ public/

      - name: Create or update PR
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          COMMIT_SHA=$(cd private && git rev-parse HEAD)
          COMMIT_MSG=$(cd private && git log -1 --pretty=%s)
          BRANCH="sync/main"

          cd public
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git checkout -b "$BRANCH"
          git add -A
          if git diff --staged --quiet; then
            echo "No public-facing changes, skipping PR"
            exit 0
          fi
          git commit -m "sync: ${COMMIT_MSG} (${COMMIT_SHA})"
          git push origin "$BRANCH" --force

          EXISTING_PR=$(gh pr list \
            --repo centrifuge/protocol \
            --head "$BRANCH" --base main \
            --json number --jq '.[0].number')
          if [ -z "$EXISTING_PR" ]; then
            gh pr create \
              --repo centrifuge/protocol \
              --title "sync: ${COMMIT_MSG}" \
              --body "Synced from centrifuge/protocol-internal@${COMMIT_SHA}" \
              --base main \
              --head "$BRANCH"
          else
            echo "PR #${EXISTING_PR} already open, branch updated"
          fi
