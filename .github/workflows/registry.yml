name: "Registry"

on:
  pull_request:
    paths:
      - ".github/workflows/registry.yml"
      - "env/**"
      - "script/registry/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/registry.yml"
      - "env/**"
      - "script/registry/**"
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci

jobs:
  generate:
    name: Build registry ABI files
    runs-on: ubuntu-latest
    outputs:
      mainnet: ${{ steps.changed_environments.outputs.mainnet }}
      testnet: ${{ steps.changed_environments.outputs.testnet }}
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.4.1

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y jq
          cd script/registry && npm install

      - name: Validate env file schemas
        run: node script/registry/validate-env-schema.js

      - name: Detect changed environments
        id: changed_environments
        run: |
          changed=$(node .github/ci-scripts/detect-changed-environments.js)
          echo "Changed environments: $changed"
          mainnet_changed=$(echo $changed | jq -r '.mainnet')
          testnet_changed=$(echo $changed | jq -r '.testnet')
          echo "mainnet=$mainnet_changed" >> $GITHUB_OUTPUT
          echo "testnet=$testnet_changed" >> $GITHUB_OUTPUT

      - name: Determine deployment commits
        id: deployment_commits
        run: |
          # Note: Deployment SHAs remain fetchable because the tag-env-updates workflow
          # automatically creates tags (deploy-${version}-${timestamp}) whenever env files
          # are updated. These tags preserve the commit SHAs in git history even after
          # branch deletion or rebasing.
          # The script returns full 40-character SHAs, expanding short SHAs if needed.
          mainnet_commit=$(node .github/ci-scripts/detect-deployment-commit.js mainnet)
          testnet_commit=$(node .github/ci-scripts/detect-deployment-commit.js testnet)
          echo "Mainnet deployment commit: $mainnet_commit"
          echo "Testnet deployment commit: $testnet_commit"
          echo "mainnet=$mainnet_commit" >> $GITHUB_OUTPUT
          echo "testnet=$testnet_commit" >> $GITHUB_OUTPUT

      - name: Fetch deployment commits
        run: |
          # Fetch the specific commits (script already returns full SHAs)
          git fetch origin ${{ steps.deployment_commits.outputs.mainnet }} --depth=1 
          git fetch origin ${{ steps.deployment_commits.outputs.testnet }} --depth=1

      - name: Build contracts at mainnet deployment commit
        if: steps.changed_environments.outputs.mainnet == 'true'
        run: |
          git worktree add /tmp/mainnet-build ${{ steps.deployment_commits.outputs.mainnet }}
          pushd /tmp/mainnet-build
          forge --version
          forge build --skip test
          popd
          mkdir -p out-mainnet
          cp -R /tmp/mainnet-build/out/* ./out-mainnet/
          git worktree remove /tmp/mainnet-build --force

      - name: Generate mainnet registry
        if: steps.changed_environments.outputs.mainnet == 'true'
        env:
          DEPLOYMENT_COMMIT: ${{ steps.deployment_commits.outputs.mainnet }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: |
          set -euo pipefail
          rm -rf out
          cp -R out-mainnet out
          node script/registry/abi-registry.js mainnet

      - name: Build contracts at testnet deployment commit
        if: steps.changed_environments.outputs.testnet == 'true'
        run: |
          git worktree add /tmp/testnet-build ${{ steps.deployment_commits.outputs.testnet }}
          pushd /tmp/testnet-build
          forge --version
          forge build --skip test
          popd
          mkdir -p out-testnet
          cp -R /tmp/testnet-build/out/* ./out-testnet/
          git worktree remove /tmp/testnet-build --force

      - name: Generate testnet registry
        if: steps.changed_environments.outputs.testnet == 'true'
        env:
          DEPLOYMENT_COMMIT: ${{ steps.deployment_commits.outputs.testnet }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: |
          set -euo pipefail
          rm -rf out
          cp -R out-testnet out
          node script/registry/abi-registry.js testnet

      - name: Validate mainnet registry
        if: steps.changed_environments.outputs.mainnet == 'true'
        run: node script/registry/validate-registry.js registry/registry-mainnet.json

      - name: Validate testnet registry
        if: steps.changed_environments.outputs.testnet == 'true'
        run: node script/registry/validate-registry.js registry/registry-testnet.json

      - name: Post PR preview comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          body="## Registry Preview\n\n"
          has_content=false

          for env_name in mainnet testnet; do
            registry_file="registry/registry-${env_name}.json"
            validation_file="registry/registry-${env_name}.validation.json"

            if [ ! -f "$registry_file" ]; then
              continue
            fi
            has_content=true

            # Extract summary from registry
            version=$(jq -r '.version // "unknown"' "$registry_file")
            chain_count=$(jq '.chains | length' "$registry_file")
            contract_count=$(jq '[.chains[].contracts | length] | add // 0' "$registry_file")
            abi_count=$(jq '.abis | length' "$registry_file")

            body="${body}### ${env_name}\n\n"
            body="${body}| Metric | Value |\n|--------|-------|\n"
            body="${body}| Version | \`${version}\` |\n"
            body="${body}| Chains with changes | ${chain_count} |\n"
            body="${body}| Contracts in delta | ${contract_count} |\n"
            body="${body}| ABIs included | ${abi_count} |\n\n"

            # Include validation findings if sidecar exists
            if [ -f "$validation_file" ]; then
              error_count=$(jq '.errors | length' "$validation_file")
              warning_count=$(jq '.warnings | length' "$validation_file")

              if [ "$error_count" -gt 0 ]; then
                body="${body}<details><summary>❌ ${error_count} error(s) — will break the indexer</summary>\n\n"
                body="${body}| Path | Message |\n|------|---------|"
                while IFS=$'\t' read -r path msg; do
                  body="${body}\n| \`${path}\` | ${msg} |"
                done < <(jq -r '.errors[] | [.path, .message] | @tsv' "$validation_file")
                body="${body}\n\n</details>\n\n"
              fi

              if [ "$warning_count" -gt 0 ]; then
                body="${body}<details><summary>⚠️ ${warning_count} warning(s)</summary>\n\n"
                body="${body}| Path | Message |\n|------|---------|"
                while IFS=$'\t' read -r path msg; do
                  body="${body}\n| \`${path}\` | ${msg} |"
                done < <(jq -r '.warnings[] | [.path, .message] | @tsv' "$validation_file")
                body="${body}\n\n</details>\n\n"
              fi

              if [ "$error_count" -eq 0 ] && [ "$warning_count" -eq 0 ]; then
                body="${body}✅ Passes all indexer requirements\n\n"
              elif [ "$error_count" -eq 0 ]; then
                body="${body}✅ Passes all indexer hard requirements\n\n"
              fi
            fi
          done

          if [ "$has_content" = false ]; then
            body="${body}No registry files were generated (no env changes detected for mainnet or testnet).\n"
          fi

          body="${body}---\n*Preview only — IPFS upload happens on merge to main.*"

          # Post or update the comment
          pr_number=${{ github.event.pull_request.number }}
          existing_comment=$(gh api "repos/${{ github.repository }}/issues/${pr_number}/comments" \
            --jq '.[] | select(.body | startswith("## Registry Preview")) | .id' | head -1)

          if [ -n "$existing_comment" ]; then
            printf '%b' "$body" | gh api "repos/${{ github.repository }}/issues/comments/${existing_comment}" \
              -X PATCH --field "body=@-"
          else
            printf '%b' "$body" | gh pr comment "${pr_number}" --body-file -
          fi

      - name: Upload registry artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contract-registries
          path: |
            registry/registry-mainnet.json
            registry/registry-testnet.json
          if-no-files-found: ignore
          retention-days: 90
  pin-to-ipfs:
    needs: [generate]
    name: Pin registry files to IPFS
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' && github.ref == 'refs/heads/main' && 
      (needs.generate.outputs.mainnet == 'true' || needs.generate.outputs.testnet == 'true')
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y jq
          cd script/registry && npm install

      - name: Download registry artifacts
        uses: actions/download-artifact@v4
        with:
          name: contract-registries
          path: registry

      - name: Pin registry files to IPFS
        id: upload_to_ipfs
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          # Run script - it logs progress then prints a single JSON line; use only last line for jq
          result=$(node script/registry/pin-to-ipfs.js)
          json_line=$(echo "$result" | tail -n 1)
          echo "$json_line" > /tmp/ipfs_result.json

          # Extract CIDs and changed status for issue creation (jq expects valid JSON only)
          mainnet_cid=$(echo "$json_line" | jq -r '.mainnet.cid // empty')
          mainnet_changed=$(echo "$json_line" | jq -r '.mainnet.changed // false')
          testnet_cid=$(echo "$json_line" | jq -r '.testnet.cid // empty')
          testnet_changed=$(echo "$json_line" | jq -r '.testnet.changed // false')

          # Set outputs for issue creation step
          if [ -n "$mainnet_cid" ] && [ "$mainnet_cid" != "null" ]; then
            echo "mainnet=$mainnet_cid" >> $GITHUB_OUTPUT
          fi
          echo "mainnet_changed=$mainnet_changed" >> $GITHUB_OUTPUT

          if [ -n "$testnet_cid" ] && [ "$testnet_cid" != "null" ]; then
            echo "testnet=$testnet_cid" >> $GITHUB_OUTPUT
          fi
          echo "testnet_changed=$testnet_changed" >> $GITHUB_OUTPUT
      - name: Update Cloudflare Web3 URL
        if: steps.upload_to_ipfs.outputs.mainnet != '' || steps.upload_to_ipfs.outputs.testnet != ''
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          MAINNET_CID: ${{ steps.upload_to_ipfs.outputs.mainnet }}
          TESTNET_CID: ${{ steps.upload_to_ipfs.outputs.testnet }}
        run: node script/registry/update-cloudflare.js
