  anvil-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
      id-token: "write"
    steps:
      - uses: actions/checkout@v3
      - id: "auth"
        uses: "google-github-actions/auth@6fc4af4b145ae7821d527454aa9bd537d1f2dc5f" # v2.1.7
        with:
          workload_identity_provider: ${{ secrets.GCP_WIP }}
          service_account: ${{ secrets.GCP_SA }}
          create_credentials_file: true
          cleanup_credentials: true

      - name: "Set up Cloud SDK"
        uses: "google-github-actions/setup-gcloud@6189d56e4096ee891640bb02ac264be376592d6a" # v2.1.2
        with:
          version: ">= 363.0.0"
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.4.4
      #Make sure all tools are installed and with proper versions
      - name: Setup deployer tools
        env:
          CI_MODE: true
        run: |
          script/deploy/setup.sh
      - name: Load secrets
        run: python3 script/deploy/load_secrets.py
      - name: Mask secrets
        run: |
          while IFS='=' read -r key value; do
            [[ -z "$key" || "$key" == \#* || -z "$value" ]] && continue
            echo "::add-mask::$value"
          done < .env
      - name: Install dependencies (forge)
        run: |
          forge install -j 0 --shallow --color auto
      - name: Build ir profile
        run: FOUNDRY_PROFILE=ir forge build
      - name: Deploy Anvil
        run: |
          python3 script/deploy/deploy.py --network anvil

  spelling:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run codespell
        uses: codespell-project/actions-codespell@v2
        with:
          skip: ./docs
          ignore_words_list: embrio


  check-benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Build ir profile
        run: FOUNDRY_PROFILE=ir forge build

      - name: Run benchmarks check
        run: ./script/utils/benchmarks.sh check
        env:
          FOUNDRY_PROFILE: ci

  claude-md-tree:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Check CLAUDE.md directory tree
        run: python3 script/utils/check_claude_tree.py

  ward-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Check ward coverage
        run: python3 script/utils/check_ward_coverage.py
