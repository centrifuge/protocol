name: Create public sync PRs

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need full history to checkout arbitrary merge commits
          path: private

      - name: Checkout public repo
        uses: actions/checkout@v4
        with:
          repository: centrifuge/protocol
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          path: public
          fetch-depth: 1

      - name: Configure git
        run: |
          git -C public config user.email "github-actions[bot]@users.noreply.github.com"
          git -C public config user.name "github-actions[bot]"

      - name: Create sync PRs
        env:
          PUBLIC_REPO_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          set -e
          PRIVATE_DIR="$(pwd)/private"
          PUBLIC_DIR="$(pwd)/public"

          # Resolve the public-sync-head tag — this marks where the last sync ended.
          # Set it manually before the first run: git tag public-sync-head <SHA> && git push origin public-sync-head
          SYNC_HEAD=$(git -C "$PRIVATE_DIR" rev-parse public-sync-head 2>/dev/null || true)
          if [ -z "$SYNC_HEAD" ]; then
            echo "Error: public-sync-head tag not found in private repo."
            echo "Create it first: git tag public-sync-head <SHA> && git push origin public-sync-head"
            exit 1
          fi
          SYNC_DATE=$(git -C "$PRIVATE_DIR" log -1 --format="%aI" "$SYNC_HEAD")
          echo "Syncing PRs merged after: $SYNC_DATE (${SYNC_HEAD})"

          # Fetch merged PRs from private, filter to those after the sync head, oldest first
          gh pr list \
            --repo centrifuge/protocol-internal \
            --state merged --base main --limit 100 \
            --json number,title,body,mergedAt,mergeCommit \
            --jq --arg since "$SYNC_DATE" \
              '[ .[] | select(.mergedAt > $since) ] | sort_by(.mergedAt)' \
            > /tmp/merged-prs.json

          COUNT=$(jq length /tmp/merged-prs.json)
          echo "Found $COUNT new merged PRs since last sync"
          [ "$COUNT" -eq 0 ] && echo "Nothing to do" && exit 0

          git -C "$PUBLIC_DIR" fetch origin --quiet
          BASE_BRANCH="main"
          LAST_SHA=""

          for i in $(seq 0 $((COUNT - 1))); do
            NUMBER=$(jq -r ".[$i].number"          /tmp/merged-prs.json)
            SHA=$(jq    -r ".[$i].mergeCommit.oid" /tmp/merged-prs.json)
            TITLE=$(jq  -r ".[$i].title"           /tmp/merged-prs.json)
            BODY=$(jq   -r ".[$i].body // \"\""    /tmp/merged-prs.json)
            BRANCH="sync/pr-${NUMBER}"

            # Skip if a public PR already exists for this branch (open or merged)
            EXISTING=$(GH_TOKEN="$PUBLIC_REPO_TOKEN" gh pr list \
              --repo centrifuge/protocol --state all \
              --head "$BRANCH" --json number --jq 'length')
            if [ "$EXISTING" -gt 0 ]; then
              echo "PR #${NUMBER}: already synced, skipping"
              BRANCH_EXISTS=$(git -C "$PUBLIC_DIR" ls-remote --heads origin "$BRANCH" | wc -l | tr -d ' ')
              [ "$BRANCH_EXISTS" -gt 0 ] && BASE_BRANCH="$BRANCH"
              LAST_SHA="$SHA"
              continue
            fi

            echo "Syncing PR #${NUMBER}: ${TITLE}"

            git -C "$PRIVATE_DIR" checkout "$SHA" --quiet
            git -C "$PUBLIC_DIR" checkout -b "$BRANCH" "origin/${BASE_BRANCH}"

            # Step 1: build filtered private snapshot in isolation
            rm -rf /tmp/ideal-public && mkdir /tmp/ideal-public
            rsync -a --delete \
              --exclude='.git' \
              --exclude='.publicignore' \
              --filter=". ${PRIVATE_DIR}/.publicignore" \
              "${PRIVATE_DIR}/" /tmp/ideal-public/

            # Step 2: find files that exist in public but not in private snapshot
            # (committed directly to public — preserve these)
            find "${PUBLIC_DIR}" -not -path "${PUBLIC_DIR}/.git*" -type f \
              | sed "s|^${PUBLIC_DIR}/||" | sort > /tmp/in-public.txt
            find /tmp/ideal-public -type f \
              | sed 's|^/tmp/ideal-public/||' | sort > /tmp/in-private.txt
            comm -23 /tmp/in-public.txt /tmp/in-private.txt > /tmp/public-only.txt

            # Step 3: sync snapshot to public, skipping public-only files
            awk '{print "- " $0}' /tmp/public-only.txt > /tmp/public-only-filter.txt
            rsync -a --delete \
              --filter=". /tmp/public-only-filter.txt" \
              /tmp/ideal-public/ "${PUBLIC_DIR}/"

            git -C "$PUBLIC_DIR" add -A
            if git -C "$PUBLIC_DIR" diff --staged --quiet; then
              echo "PR #${NUMBER}: no public-facing changes, skipping"
              git -C "$PUBLIC_DIR" checkout "$BASE_BRANCH" --quiet
              git -C "$PUBLIC_DIR" branch -d "$BRANCH"
              LAST_SHA="$SHA"
              continue
            fi

            git -C "$PUBLIC_DIR" commit -m "sync: ${TITLE} (${SHA})"
            git -C "$PUBLIC_DIR" push origin "$BRANCH"

            printf '%s\n\n---\n_Synced from [protocol-internal#%s](https://github.com/centrifuge/protocol-internal/pull/%s)_\n' \
              "$BODY" "$NUMBER" "$NUMBER" > /tmp/pr-body.md

            GH_TOKEN="$PUBLIC_REPO_TOKEN" gh pr create \
              --repo centrifuge/protocol \
              --title "$TITLE" \
              --body-file /tmp/pr-body.md \
              --base "$BASE_BRANCH" \
              --head "$BRANCH"

            BASE_BRANCH="$BRANCH"
            LAST_SHA="$SHA"
            echo "Created public PR for #${NUMBER}"
          done

          # Advance the sync head tag to the last processed PR
          git -C "$PRIVATE_DIR" tag -f public-sync-head "$LAST_SHA"
          git -C "$PRIVATE_DIR" push origin public-sync-head --force
          echo "Advanced public-sync-head to ${LAST_SHA}"
