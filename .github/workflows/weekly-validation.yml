# Weekly Deployment Validation
#
# Runs live fork tests from the `live-validators` branch against all deployed networks.
# The `live-validators` branch is pinned to the latest deployed protocol version.
#
# To update after a new deployment:
#   git push origin <release-tag-or-commit>:refs/heads/live-validators --force
#
# Schedule triggers only fire on the default branch (main), so this file must
# live on main even though it checks out `live-validators` for test execution.

name: Weekly Deployment Validation

on:
  schedule:
    - cron: "15 6 * * 1" # Monday 6:15 AM UTC
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to validate (default: live-validators)"
        required: false
        default: "live-validators"

env:
  FOUNDRY_PROFILE: ci

jobs:
  validate-state:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: "read"
      id-token: "write"
    strategy:
      fail-fast: false
      matrix:
        chain:
          - { name: "Ethereum", test: "testLiveValidation_Ethereum" }
          - { name: "Base", test: "testLiveValidation_Base" }
          - { name: "Arbitrum", test: "testLiveValidation_Arbitrum" }
          - { name: "Plume", test: "testLiveValidation_Plume" }
          - { name: "Avalanche", test: "testLiveValidation_Avalanche" }
          - { name: "BNB", test: "testLiveValidation_BnbSmartChain" }
          - { name: "Optimism", test: "testLiveValidation_Optimism" }
          - { name: "HyperEVM", test: "testLiveValidation_HyperEvm" }
          - { name: "Monad", test: "testLiveValidation_Monad" }
    name: "State: ${{ matrix.chain.name }}"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || 'live-validators' }}
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIP }}
          service_account: ${{ secrets.GCP_SA }}
      - uses: google-github-actions/setup-gcloud@v2
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.4.4
      - run: python3 script/deploy/load_secrets.py
      - run: forge test --match-test "${{ matrix.chain.test }}" -vv

  validate-flows:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: "read"
      id-token: "write"
    strategy:
      fail-fast: false
      matrix:
        chain:
          - { name: "Ethereum", test: "testInvestmentFlows_Ethereum" }
          - { name: "Base", test: "testInvestmentFlows_Base" }
          - { name: "Arbitrum", test: "testInvestmentFlows_Arbitrum" }
          - { name: "Plume", test: "testInvestmentFlows_Plume" }
          - { name: "Avalanche", test: "testInvestmentFlows_Avalanche" }
          - { name: "BNB", test: "testInvestmentFlows_BnbSmartChain" }
          - { name: "Optimism", test: "testInvestmentFlows_Optimism" }
          - { name: "HyperEVM", test: "testInvestmentFlows_HyperEvm" }
          - { name: "Monad", test: "testInvestmentFlows_Monad" }
    name: "Flows: ${{ matrix.chain.name }}"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || 'live-validators' }}
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIP }}
          service_account: ${{ secrets.GCP_SA }}
      - uses: google-github-actions/setup-gcloud@v2
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.4.4
      - run: python3 script/deploy/load_secrets.py
      - run: forge test --match-test "${{ matrix.chain.test }}" -vv
